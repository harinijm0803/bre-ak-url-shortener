k<!DOCTYPE html>
<html>
<head><title>URL Shortener</title></head>
<body>
<h2>URL Shortener</h2>
<form id="shortenForm">
<input type="text" id="url" placeholder="Enter URL">
<input type="text" id="alias" placeholder="Custom alias (optional)">
<input type="number" id="minutes" placeholder="Expiry in minutes (optional)">
<button type="submit">Generate</button>
</form>
<div id="result"></div>
<script>
const form = document.getElementById('shortenForm');
form.addEventListener('submit', async e => {
    e.preventDefault();
    const formData = new FormData();
    formData.append('url', document.getElementById('url').value);
    formData.append('alias', document.getElementById('alias').value);
    formData.append('minutes', document.getElementById('minutes').value);
    const response = await fetch('/shorten/', { method:'POST', body: formData });
    const data = await response.json();
    if(data.error){
        document.getElementById('result').innerHTML = `<p style="color:red;">${data.error}</p>`;
    } else {
        document.getElementById('result').innerHTML = `<p>Short URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a></p><p>Click count: ${data.click_count}</p>`;
    }
});
</script>
</body>
</html>
