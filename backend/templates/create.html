<!DOCTYPE html>
<html>

<head>

<style>

body{

    background:#f2f4f8;
    font-family: Arial;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}


/* container */

.box{

    background:white;

    padding:40px;

    border-radius:10px;

    text-align:center;

    width:400px;

    box-shadow:0 0 10px #ddd;
}


/* logo */

.logo{

    font-size:40px;

    color:brown;

    margin-bottom:20px;

    font-weight:bold;
}


/* title */

.title{

    font-size:22px;

    margin-bottom:20px;
}


/* input */

input{

    width:100%;

    padding:10px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:5px;
}


/* button */

button{

    background:#4CAF50;

    color:white;

    padding:10px 20px;

    border:none;

    border-radius:5px;

    font-size:16px;

}

</style>

</head>

<body>


<div class="box">


<div class="logo">

Bre.ak

</div>


<div class="title">

Create URL

</div>


<form method="POST" action="/generate/">

{% csrf_token %}

<input
type="url"
name="original_url"
placeholder="Paste your link"
required>


<button type="submit">

Generate

</button>


</form>


</div>


</body>
</html>
